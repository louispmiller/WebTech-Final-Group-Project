# Author: Ojong Bessong NKONGHO
# GitHub Actions workflow — runs PHPUnit tests on every push to this branch.
# Tests use an in-memory SQLite database so no MySQL setup is needed.

name: Tests / PHPUnit (Backend Architecture)

on:
  push:
    branches:
      - feature/backend-architecture
  pull_request:
    branches:
      - main

jobs:
  phpunit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit tests
        run: php vendor/bin/phpunit